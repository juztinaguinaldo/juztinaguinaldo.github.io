<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .card {
            background: white;
            width: 300px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 5px;
        }

        p {
            color: gray;
            margin-top: 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #e3e7eb;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            background: #4a90e2;
            padding: 10px 15px;
            border-radius: 6px;
        }

        a:hover {
            background: #357abd;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>ALDRIN BRYLLE D SANTOS</h1>
        <p>BSIT - 1B</p>

        <h2>My Hobbies</h2>
        <ul>
            <li>Cycling</li>
            <li>Gaming</li>
            <li>Riding</li>
        </ul>

        <a href="https://github.com" target="_blank">Visit GitHub</a>
    </div>

</body>
</html>
