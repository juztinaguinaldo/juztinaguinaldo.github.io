<!DOCTYPE html>
<html>
<head>
    <title>My Simple Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }

        header {
            background-color: #333333;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 15px;
        }

        .content {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        img {
            width: 100px;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
        }

        ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }

        li {
            background: #e0e0e0;
            margin: 8px;
            padding: 10px;
            border-radius: 6px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: white;
            background: #020202;
            padding: 10px;
            border-radius: 6px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            color: #555;
        }
    </style>
</head>
