<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>My First Web Page</title> 
 
    <style> 
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(to right, #4facfe, #00f2fe); 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        } 
 
        .container { 
            background: #fff; 
            margin: 50px auto; 
            padding: 30px; 
            max-width: 600px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        } 
 
        h1 { 
            color: #0077cc; 
        } 
 
        h2 { 
            color: #444; 
            margin-top: 20px; 
        } 
 
        ul { 
            list-style: none; 
            padding: 0; 
        } 
 
        li { 
            background: #f0f0f0; 
            margin: 8px 0; 
            padding: 10px; 
            border-radius: 5px; 
        } 
 
        img { 
            width: 100%; 
            max-width: 400px; 
            margin-top: 20px; 
            border-radius: 10px; 
        } 
 
        a { 
            display: inline-block; 
            margin-top: 20px; 
            text-decoration: none; 
            background: #0077cc; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 5px; 
        } 
 
        a:hover { 
            background: #005fa3; 
        } 
    </style> 
</head> 
 
<body> 
    <div class="container"> 
        <h1>Welcome to My Website</h1> 
        <p>This is my first webpage.</p> 
 
        <h2>My Hobbies</h2> 
        <ul> 
            <li>   Playing Basketball</li> 
            <li>           Riding Motorcycles</li> 
            <li>    Singing</li> 
        </ul> 
 
        <img src="https://www.allerin.com/blog/wp-content/uploads/2018/03/There-is-noescaping-the-holographic-technology-3.jpg" alt="Sample image"> 
        <br> 
        <a href="https://github.com" target="_blank">Visit GitHub</a> 
    </div> 
</body> 
</html>
